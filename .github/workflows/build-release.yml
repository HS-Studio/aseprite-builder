name: Build and Release Aseprite

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.3.10)"
        required: true
        type: string

permissions:
  contents: write

env:
  SKIA_VERSION: "m124"
  BUILD_TYPE: RelWithDebInfo

jobs:
  # ──────────────────────────────────────────────
  # Determine the release tag in all trigger cases
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare release info
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────
  # Windows build
  # ──────────────────────────────────────────────
  build-windows:
    name: Build · Windows
    needs: prepare
    runs-on: windows-2022

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Skia
        id: cache-skia-win
        uses: actions/cache@v4
        with:
          path: C:\deps\skia
          key: skia-windows-x64-${{ env.SKIA_VERSION }}

      - name: Download Skia (Windows x64)
        if: steps.cache-skia-win.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile skia.zip
          New-Item -ItemType Directory -Force -Path C:\deps\skia | Out-Null
          Expand-Archive -Path skia.zip -DestinationPath C:\deps\skia

      - name: Configure CMake (VS 2022 x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          mkdir build
          cmake ^
            -B build ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=%BUILD_TYPE% ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=C:\deps\skia ^
            -DSKIA_LIBRARY_DIR=C:\deps\skia\out\Release-x64 ^
            -DSKIA_LIBRARY=C:\deps\skia\out\Release-x64\skia.lib

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=x64
          ninja -C build aseprite

      - name: Package
        shell: pwsh
        run: |
          $dest = "aseprite-windows-x64"
          New-Item -ItemType Directory $dest
          Copy-Item build\bin\aseprite.exe $dest\
          Copy-Item build\bin\data -Recurse -Destination $dest\data
          Compress-Archive -Path $dest -DestinationPath aseprite-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows-x64
          path: aseprite-windows-x64.zip

  # ──────────────────────────────────────────────
  # macOS build (x86_64 + Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    name: Build · macOS (${{ matrix.arch }})
    needs: prepare
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - arch: x86_64
            skia_arch: x64
            skia_asset: Skia-macOS-Release-x64.zip
            osx_target: "10.14"
          - arch: arm64
            skia_arch: arm64
            skia_asset: Skia-macOS-Release-arm64.zip
            osx_target: "11.0"

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Skia
        id: cache-skia-mac
        uses: actions/cache@v4
        with:
          path: ~/deps/skia
          key: skia-macos-${{ matrix.arch }}-${{ env.SKIA_VERSION }}

      - name: Download Skia (macOS ${{ matrix.arch }})
        if: steps.cache-skia-mac.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/aseprite/skia/releases/latest/download/${{ matrix.skia_asset }}" \
            -o skia.zip
          mkdir -p ~/deps/skia
          unzip -q skia.zip -d ~/deps/skia

      - name: Install dependencies
        run: brew install cmake ninja

      - name: Configure CMake
        run: |
          SYSROOT=$(xcrun --sdk macosx --show-sdk-path)
          mkdir build && cd build
          cmake \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.osx_target }} \
            -DCMAKE_OSX_SYSROOT="$SYSROOT" \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$HOME/deps/skia \
            -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-${{ matrix.skia_arch }} \
            -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-${{ matrix.skia_arch }}/libskia.a \
            ${{ matrix.arch == 'arm64' && '-DPNG_ARM_NEON:STRING=on' || '' }} \
            ..

      - name: Build
        run: ninja -C build aseprite

      - name: Package
        run: |
          dest="aseprite-macos-${{ matrix.arch }}"
          mkdir "$dest"
          cp build/bin/aseprite "$dest/"
          cp -r build/bin/data "$dest/data"
          zip -r "aseprite-macos-${{ matrix.arch }}.zip" "$dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-macos-${{ matrix.arch }}
          path: aseprite-macos-${{ matrix.arch }}.zip

  # ──────────────────────────────────────────────
  # Linux build (Ubuntu 20.04 / clang)
  # ──────────────────────────────────────────────
  build-linux:
    name: Build · Linux (x86_64)
    needs: prepare
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout source (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ clang cmake ninja-build \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev \
            libgl1-mesa-dev libfontconfig1-dev

      - name: Cache Skia
        id: cache-skia-linux
        uses: actions/cache@v4
        with:
          path: ~/deps/skia
          key: skia-linux-x64-${{ env.SKIA_VERSION }}

      - name: Download Skia (Linux x64)
        if: steps.cache-skia-linux.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/aseprite/skia/releases/latest/download/Skia-Linux-Release-x64-libstdc++.zip" \
            -o skia.zip
          mkdir -p ~/deps/skia
          unzip -q skia.zip -d ~/deps/skia

      - name: Configure CMake
        run: |
          mkdir build && cd build
          export CC=clang
          export CXX=clang++
          cmake \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_CXX_FLAGS:STRING=-stdlib=libstdc++ \
            -DCMAKE_EXE_LINKER_FLAGS:STRING=-stdlib=libstdc++ \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR=$HOME/deps/skia \
            -DSKIA_LIBRARY_DIR=$HOME/deps/skia/out/Release-x64 \
            -DSKIA_LIBRARY=$HOME/deps/skia/out/Release-x64/libskia.a \
            ..

      - name: Build
        run: ninja -C build aseprite

      - name: Package
        run: |
          dest="aseprite-linux-x86_64"
          mkdir "$dest"
          cp build/bin/aseprite "$dest/"
          cp -r build/bin/data "$dest/data"
          tar -czf "aseprite-linux-x86_64.tar.gz" "$dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-linux-x86_64
          path: aseprite-linux-x86_64.tar.gz

  # ──────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ──────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [prepare, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "Aseprite ${{ needs.prepare.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/aseprite-windows-x64/aseprite-windows-x64.zip
            dist/aseprite-macos-x86_64/aseprite-macos-x86_64.zip
            dist/aseprite-macos-arm64/aseprite-macos-arm64.zip
            dist/aseprite-linux-x86_64/aseprite-linux-x86_64.tar.gz
